get:
  tags: ["course"]
  parameters:
    - name: prefecture_id
      in: query
      required: false
      schema:
        type: integer
  responses:
    "200":
      description: "Successful response"
      content:
        application/json:
          schema:
            $ref: "../components/schemas/response/courses.yaml#/components/schemas/CourseResponseData"
    default:
      description: "Error response"
      content:
        application/json:
          schema:
            $ref: "../components/schemas/response/error.yaml#/components/schemas/ErrorResponse"
post:
  tags: ["course"]
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/x-www-form-urlencoded:
        schema:
          $ref: "../components/schemas/request/courses.yaml#/components/schemas/CourseFormRequestData"
  responses:
    "201":
      description: "Successful response"
      content:
        application/json:
          schema:
            $ref: "../components/schemas/response/courses.yaml#/components/schemas/CourseFormResponseData"
