delete:
  tags: ["user"]
  security:
    - bearerAuth: []
  parameters:
    - $ref: "../components/schemas/parameter.yaml#/components/parameters/CurrentUserIdParam"
    - $ref: "../components/schemas/parameter.yaml#/components/parameters/OtherUserIdParam"
  responses:
    "200":
      description: "Successful response"
      content:
        application/json:
          schema:
            $ref: "../components/schemas/response/relationship.yaml#/components/schemas/UnFollowResponseData"
    default:
      description: "Error response"
      content:
        application/json:
          schema:
            $ref: "../components/schemas/response/error.yaml#/components/schemas/ErrorResponse"
