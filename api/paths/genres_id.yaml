get:
  tags: ["genre"]
  parameters:
    - $ref: "../components/schemas/parameter.yaml#/components/parameters/IdParam"
  responses:
    "200":
      description: "Successful response"
      content:
        application/json:
          schema:
            type: object
            required:
              - date_spots
            properties:
              date_spots:
                type: array
                items:
                  $ref: "../components/schemas/response/date_spot_summary_data.yaml#/components/schemas/DateSpotSummaryData"
    default:
      description: "Error response"
      content:
        application/json:
          schema:
            $ref: "../components/schemas/response/error.yaml#/components/schemas/ErrorResponse"
