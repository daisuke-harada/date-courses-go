get:
  tags: ["date_spot"]
  parameters:
    - name: date_spot_name
      in: query
      required: false
      schema:
        type: string
    - name: prefecture_id
      in: query
      required: false
      schema:
        type: integer
    - name: genre_id
      in: query
      required: false
      schema:
        type: integer
    - name: come_time
      in: query
      required: false
      schema:
        type: string
  responses:
    "200":
      description: "Successful response"
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../components/schemas/response/address_and_date_spots.yaml#/components/schemas/AddressAndDateSpotsData"
    default:
      description: "Error response"
      content:
        application/json:
          schema:
            $ref: "../components/schemas/response/error.yaml#/components/schemas/ErrorResponse"
post:
  tags: ["date_spot"]
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: "../components/schemas/request/date_spots.yaml#/components/schemas/DateSpotFormRequestData"
  responses:
    "201":
      description: "Successful response"
      content:
        application/json:
          schema:
            $ref: "../components/schemas/response/date_spots.yaml#/components/schemas/DateSpotFormResponseData"
    default:
      description: "Error response"
      content:
        application/json:
          schema:
            $ref: "../components/schemas/response/error.yaml#/components/schemas/ErrorResponse"
